spring:
  application:
    name: CouponManager
  datasource:
    url: jdbc:postgresql://localhost:5432/coupon_manager
    username: coupon_manager
    password: coupon_manager
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

coupon-manager:
  redemption:
    country-restriction:
      enabled: true

  integrations:
    geo-ip:
      provider: ip-api
      base-url: http://ip-api.com